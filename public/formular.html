<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Beauftragung Machbarkeitsprüfung</title>
</head>
<body>

<h1>Beauftragung Machbarkeitsprüfung PV x</h1>
<h3>150€ inkl. MwSt-Satz 0%</h3>
  
<form id="mpForm">

  <input name="kunde_name" placeholder="Name" required><br><br>

  <input type="email" name="kunde_email" placeholder="E-Mail" required><br><br>

  <input name="kunde_tel" placeholder="Telefon" required><br><br>

  <input name="kunde_rechnungsadresse" placeholder="Rechnungsadresse" required><br><br>

  <label>
    <input type="checkbox" name="private_zwecke" required>
    Anlage dient überwiegend privaten Zwecken*
  </label><br>

  <label>
    <input type="checkbox" name="ust0_voraussetzungen" required>
    Voraussetzungen für 0% USt erfüllt*
  </label><br><br>

  <button type="submit">Kostenpflichtig beauftragen</button>
<h3>Unterschrift*</h3>
<canvas id="sig" width="600" height="200" style="border:1px solid #ccc; border-radius:8px; touch-action:none;"></canvas>
<br>
<button type="button" id="sigClear">Unterschrift löschen</button>

<input type="hidden" name="signature_png" id="signature_png">
<p id="sigStatus" style="color:#b00;"></p>
<br>
  
</form>

<p id="status"></p>

<script>
const canvas = document.getElementById('sig');
const ctx = canvas.getContext('2d');
const clearBtn = document.getElementById('sigClear');
const sigStatus = document.getElementById('sigStatus');
const sigHidden = document.getElementById('signature_png');

let drawing = false;
let hasSignature = false;

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches && e.touches[0];
  const clientX = touch ? touch.clientX : e.clientX;
  const clientY = touch ? touch.clientY : e.clientY;
  return { x: clientX - rect.left, y: clientY - rect.top };
}

function startDraw(e) {
  drawing = true;
  const p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  e.preventDefault();
}

function draw(e) {
  if (!drawing) return;
  const p = getPos(e);
  ctx.lineTo(p.x, p.y);
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.stroke();
  hasSignature = true;
  sigStatus.textContent = '';
  e.preventDefault();
}

function endDraw(e) {
  drawing = false;
  e.preventDefault();
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
window.addEventListener('mouseup', endDraw);

canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', draw, { passive: false });
canvas.addEventListener('touchend', endDraw, { passive: false });

clearBtn.addEventListener('click', () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  hasSignature = false;
  sigHidden.value = '';
  sigStatus.textContent = 'Bitte unterschreiben.';
});

document.getElementById('mpForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  if (!hasSignature) {
    sigStatus.textContent = 'Unterschrift ist erforderlich.';
    return;
  }

  // Unterschrift als PNG (Base64) in hidden field schreiben
  sigHidden.value = canvas.toDataURL('image/png');

  const data = Object.fromEntries(new FormData(e.target).entries());
  data.private_zwecke = !!data.private_zwecke;
  data.ust0_voraussetzungen = !!data.ust0_voraussetzungen;

  const res = await fetch('/api/machbarkeitspruefung', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data),
  });

  const txt = await res.text();
  document.getElementById('status').innerText = txt;
});
</script>

</body>
</html>
